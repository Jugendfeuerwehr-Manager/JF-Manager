version: '3.8'

services:
  db:
    container_name: jf_manager_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jf_manager_backend}
      POSTGRES_USER: ${POSTGRES_USER:-jf_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jf_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - database:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    container_name: jf_manager_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    container_name: jf_manager_backend
    image: jf_manager_backend:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-jf_manager}:${POSTGRES_PASSWORD:-changeme}@db/${POSTGRES_DB:-jf_manager_backend}
      REDIS_URL: redis://redis:6379
      DJANGO_MANAGEPY_MIGRATE: ${DJANGO_MANAGEPY_MIGRATE:-on}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      DEBUG: ${DEBUG:-False}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
    build:
      context: ./backend
      dockerfile: ./Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "8000"
    volumes:
      - static:/static
      - uploads:/uploads
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /tmp/django_imagefit

  frontend:
    container_name: jf_manager_frontend
    image: jf_manager_frontend:latest
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "${HTTP_PORT:-80}:8080"
    volumes:
      - static:/static:ro
      - uploads:/uploads:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  backup:
    container_name: jf_manager_backup
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jf_manager_backend}
      POSTGRES_USER: ${POSTGRES_USER:-jf_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - backend
    entrypoint: /bin/sh
    command: -c "chmod +x /backup.sh && /backup.sh"
    profiles:
      - backup
    depends_on:
      - db

networks:
  backend:
    driver: bridge

volumes:
  database:
    driver: local
  redis:
    driver: local
  static:
    driver: local
  uploads:
    driver: local
