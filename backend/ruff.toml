# Ruff configuration for JF-Manager backend
target-version = "py310"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "RUF001", # ambiguous characters (German text uses en-dashes intentionally)
    "RUF012", # mutable class attributes (common in Django models)
    "SIM108", # ternary operator (readability preference)
]

[lint.per-file-ignores]
"*/migrations/*.py" = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]
"manage.py" = ["E", "W", "F", "I", "UP"]
"*/__init__.py" = ["F401", "F403", "F405"]

[lint.isort]
known-first-party = [
    "members",
    "inventory",
    "orders",
    "servicebook",
    "qualifications",
    "settings_manager",
    "users",
    "health",
    "jf_manager_backend",
]
