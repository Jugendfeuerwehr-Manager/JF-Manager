version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
      target: production
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
    volumes:
      - ./backend:/app:ro
      - static:/static
      - uploads:/uploads
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    ports:
      - "8080:80"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
