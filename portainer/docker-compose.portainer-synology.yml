version: '3.8'

# JF-Manager - Portainer Stack Configuration for Synology NAS
# This file uses bind mounts to preserve existing data
# Replace /volume1/docker/JFManager with your actual path
# See portainer/README.md for deployment instructions

services:
  db:
    image: postgres:15-alpine
    container_name: jf_manager_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - jf_manager_database:/var/lib/postgresql/data
      - jf_manager_backups:/backups
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB

  redis:
    image: redis:7-alpine
    container_name: jf_manager_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - jf_manager_redis:/data
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/jugendfeuerwehr-manager/jf-manager/backend:nextgeneration-frontend
    container_name: jf_manager_backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DJANGO_MANAGEPY_MIGRATE: ${DJANGO_MANAGEPY_MIGRATE:-on}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DEBUG: ${DEBUG:-False}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "8000"
    volumes:
      - jf_manager_static:/static
      - jf_manager_uploads:/uploads
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/jugendfeuerwehr-manager/jf-manager/frontend:nextgeneration-frontend
    container_name: jf_manager_frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - jf_manager_static:/static:ro
      - jf_manager_uploads:/uploads:ro
      # Uncomment to use custom SSL certificates
      # - jf_manager_ssl:/etc/nginx/ssl:ro
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jf_manager_backend:
    driver: bridge

volumes:
  # Database volume - preserves your existing PostgreSQL data
  jf_manager_database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/database

  # Static files volume - Django admin/DRF static assets
  jf_manager_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/static

  # Uploads volume - preserves your existing uploaded files
  jf_manager_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/uploads

  # Redis volume - can be regular Docker volume (no persistent data to migrate)
  jf_manager_redis:
    driver: local

  # Backups volume - for automated database backups
  jf_manager_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/backups

  # Uncomment for custom SSL certificates
  # jf_manager_ssl:
  #   driver: local
  #   driver_opts:
  #     type: none
  #     o: bind
  #     device: /volume1/docker/JFManager/ssl
