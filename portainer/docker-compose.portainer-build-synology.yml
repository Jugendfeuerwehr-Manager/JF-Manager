version: '3.8'

# JF-Manager - Portainer Stack for Synology (Build from Source)
# This version builds from GitHub and uses bind mounts for data persistence
# IMPORTANT: Portainer on Synology may not support building from Git URLs
# If builds fail, you need to wait for GHCR images or use manual docker build

services:
  db:
    image: postgres:15-alpine
    container_name: jf_manager_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - jf_manager_database:/var/lib/postgresql/data
      - jf_manager_backups:/backups
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB

  redis:
    image: redis:7-alpine
    container_name: jf_manager_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - jf_manager_redis:/data
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: https://github.com/Jugendfeuerwehr-Manager/JF-Manager.git#${GIT_BRANCH:-nextgeneration-frontend}
      dockerfile: backend/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${GIT_BRANCH:-nextgeneration-frontend}
    image: jf_manager_backend:${IMAGE_TAG:-latest}
    container_name: jf_manager_backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DJANGO_MANAGEPY_MIGRATE: ${DJANGO_MANAGEPY_MIGRATE:-on}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DEBUG: ${DEBUG:-False}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "8000"
    volumes:
      - jf_manager_static:/static
      - jf_manager_uploads:/uploads
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: https://github.com/Jugendfeuerwehr-Manager/JF-Manager.git#${GIT_BRANCH:-nextgeneration-frontend}
      dockerfile: frontend/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${GIT_BRANCH:-nextgeneration-frontend}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: jf_manager_frontend:${IMAGE_TAG:-latest}
    container_name: jf_manager_frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "${HTTP_PORT:-80}:8080"
    volumes:
      - jf_manager_static:/static:ro
      - jf_manager_uploads:/uploads:ro
    networks:
      - jf_manager_backend
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jf_manager_backend:
    driver: bridge

volumes:
  # Database volume - bind mount to preserve existing data
  jf_manager_database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/database

  # Static files volume
  jf_manager_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/static

  # Uploads volume - bind mount to preserve existing data
  jf_manager_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/uploads

  # Redis volume
  jf_manager_redis:
    driver: local

  # Backups volume
  jf_manager_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/JFManager/backups
