# Django static files (CSS, JS, Images for admin)
location /static/ {
    alias /static/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# User uploads
location /uploads/ {
    alias /uploads/;
    expires 7d;
    add_header Cache-Control "public";
    
    # Security: Prevent execution of uploaded files
    location ~* \.(php|py|pl|jsp|asp|sh|cgi)$ {
        deny all;
    }
}
